name: Sync Upstream Tags Automatically
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PAT }}

      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git || true
          git fetch upstream --tags
          git push origin --tags
