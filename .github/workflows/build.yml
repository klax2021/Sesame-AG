name: Build Signed APK
on:
  push:
    tags:
      - '*'       # 上游同步新TAG自动触发打包（全自动）
  workflow_dispatch: # 手动只能选main启动脚本

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取全部标签，用来筛选最新TAG

      - name: 1. 自动切换源码
        run: |
          # TAG推送自动触发：使用当前TAG源码
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "APP_VER=${TAG#*-}" >> $GITHUB_ENV
          else
            # 手动main启动：筛选编号最大最新TAG，切AG源码
            LATEST_TAG=$(git tag | sort -t'-' -k1 -n | tail -1)
            git checkout $LATEST_TAG
            echo "APP_VER=${LATEST_TAG#*-}" >> $GITHUB_ENV
          fi

      - name: 预配置Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 2. 动态注入个人签名与架构精简配置
        run: |
          # 切完源码后，直接向 app/build.gradle 末尾追加你的专属配置
          cat << 'EOF' >> app/build.gradle

          android {
            // 极致瘦身：强制只保留 arm64-v8a 架构
            defaultConfig {
              ndk {
                abiFilters 'arm64-v8a'
              }
            }

            if (System.getenv("KEYSTORE_PASSWORD") != null) {
              signingConfigs {
                release {
                  storeFile file("mykey.jks")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
                }
              }
              buildTypes {
                release {
                  // 使用标准 API 确保高版本 Gradle 映射成功
                  signingConfig signingConfigs.findByName('release')
                  
                  // 明确关闭混淆与资源缩减，确保 Xposed 模块/插件绝对不闪退
                  minifyEnabled false
                  shrinkResources false
                }
              }
            }
          }
          EOF

      - name: 3. Decode Keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo -n "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: 4. Make gradlew executable
        run: chmod +x gradlew

      - name: 5. Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: 6. Rename APK(only arm64-v8a)
        env:
          VER: ${{ env.APP_VER }}
        run: |
          SRC_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a*.apk" | head -1)
          mv "$SRC_APK" "./Sesame-TK-arm64-v8a-${VER}-signed.apk"

      - name: 7. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: Sesame-TK-arm64-v8a-${{ env.APP_VER }}-signed.apk
