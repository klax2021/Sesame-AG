name: Build Signed APK
on:
  push:
    tags:
      - '*'       # 上游同步新TAG自动触发打包（全自动）
  workflow_dispatch: # 手动只能选main启动脚本

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取全部标签

      - name: 1. 自动切换源码
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "APP_VER=${TAG}" >> $GITHUB_ENV
          else
            # 修正手动触发时的兜底逻辑，改用 Git 原生语义化版本排序
            LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
            if [ -n "$LATEST_TAG" ]; then
              git checkout $LATEST_TAG
              echo "APP_VER=${LATEST_TAG}" >> $GITHUB_ENV
            else
              echo "APP_VER=dev" >> $GITHUB_ENV
            fi
          fi

      - name: 预配置Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 2. 屏蔽免责弹窗（保留实例化，仅剥离 show 规避闪退）
        run: |
          TARGET_MAIN=$(find app/src -name "MainActivity.kt")
          if [ -n "$TARGET_MAIN" ]; then
            echo "找到目标文件: $TARGET_MAIN"
            # 使用扩展正则，完美兼容无参/有参的 DisclaimerDialog 转换
            sed -i -E 's/(DisclaimerDialog\(.*\))\.show\(\)/\1/' "$TARGET_MAIN"
          else
            echo "未找到 MainActivity.kt，跳过此步骤"
          fi

      - name: 3. 动态注入个人签名（完全放权，沿用官方原生架构与混淆配置）
        run: |
          cat << 'EOF' >> app/build.gradle.kts
          android {
              if (System.getenv("KEYSTORE_PASSWORD") != null) {
                  signingConfigs {
                      maybeCreate("customRelease").apply {
                          storeFile = file("mykey.jks")
                          storePassword = System.getenv("KEYSTORE_PASSWORD")
                          keyAlias = System.getenv("KEY_ALIAS")
                          keyPassword = System.getenv("KEY_PASSWORD")
                      }
                  }
                  buildTypes {
                      getByName("release") {
                          signingConfig = signingConfigs.getByName("customRelease")
                      }
                  }
              }
          }
          EOF

      - name: 4. Decode Keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo -n "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: 5. Make gradlew executable
        run: chmod +x gradlew

      - name: 6. Build Release APK（全量编译，确保生成链绝对稳健）
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: 7. 精准提取 arm64-v8a 并规范化重命名
        run: |
          mkdir -p ./out_apks
          
          # 1. 精准定位官方生成的标准 v8a 成品（排除未对齐的中间件）
          TARGET_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a*.apk" ! -name "*unaligned*" | head -n 1)
          
          if [ -n "$TARGET_APK" ]; then
            echo "成功找到目标 v8a APK: $TARGET_APK"
            # 2. 复制并重命名为你指定的标准格式：Sesame-AG-版本号-Signed.apk
            cp "$TARGET_APK" "./out_apks/Sesame-AG-${{ env.APP_VER }}-Signed.apk"
          else
            echo "错误：未找到符合条件的 arm64-v8a APK！" && exit 1
          fi
          
          ls -l ./out_apks/

      - name: 8. 上传有效打包产物（保持默认的 ZIP 压缩包命名规则）
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-AG-${{ env.APP_VER }}-Signed-APKs
          path: ./out_apks/
