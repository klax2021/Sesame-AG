name: Build Signed APK
on:
  push:
    tags:
      - '*' # 匹配所有格式tag：4017-0.1.0这类，上游同步tag自动触发构建
  workflow_dispatch: # 保留手动触发入口（永远在main分支运行）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # ==========手动打包关键：手动运行时，自动拉最新tag源码
          fetch-depth: 0

      # 自动识别：tag触发=切当前tag；手动dispatch=自动切换到仓库最新tag代码
      - name: Switch latest tag when manual run
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]];then
            LATEST_TAG=$(git tag | sort -t'-' -k1 -n | tail -n1)
            git checkout $LATEST_TAG
            echo "APP_VER=${LATEST_TAG#*-}" >> $GITHUB_ENV
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "APP_VER=${TAG_NAME#*-}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Decode Keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK(only arm64-v8a)
        env:
          VER: ${{ env.APP_VER }}
        run: |
          SRC_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a*.apk" | head -1)
          mv "$SRC_APK" "./Sesame-TK-arm64-v8a-${VER}-signed.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: Sesame-TK-arm64-v8a-${{ env.APP_VER }}-signed.apk
