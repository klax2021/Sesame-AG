name: Build Signed APK
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]];then
            APP_VER=${GITHUB_REF#refs/tags/v}
          else
            APP_VER=dev
          fi
          echo "APP_VER=$APP_VER" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Decode Keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_agBuild=true
          export ORG_GRADLE_PROJECT_onlyArm64=true
          export ORG_GRADLE_PROJECT_isRelease=true
          ./gradlew assembleRelease

      - name: Rename APK(only arm64-v8a)
        env:
          VER: ${{ env.APP_VER }}
        run: |
          # 精准只筛选arm64-v8a的apk
          SRC_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a*.apk" | head -1)
          mv "$SRC_APK" "./Sesame-TK-arm64-v8a-${VER}-signed.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: Sesame-TK-arm64-v8a-${{ env.APP_VER }}-signed.apk
