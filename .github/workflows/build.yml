name: Build Signed APK
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 1. 自动切换源码
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "APP_VER=${TAG#*-}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(git tag | sort -t'-' -k1 -n | tail -1)
            if [ -n "$LATEST_TAG" ]; then
              git checkout $LATEST_TAG
              echo "APP_VER=${LATEST_TAG#*-}" >> $GITHUB_ENV
            else
              echo "APP_VER=dev" >> $GITHUB_ENV
            fi
          fi

      - name: 预配置Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 2. 动态注入签名与架构
        run: |
          cat << 'EOF' >> app/build.gradle.kts
          android {
              defaultConfig {
                  ndk {
                      abiFilters.clear()
                      abiFilters.add("arm64-v8a")
                  }
              }
              if (System.getenv("KEYSTORE_PASSWORD") != null) {
                  signingConfigs {
                      maybeCreate("customRelease").apply {
                          storeFile = file("mykey.jks")
                          storePassword = System.getenv("KEYSTORE_PASSWORD")
                          keyAlias = System.getenv("KEY_ALIAS")
                          keyPassword = System.getenv("KEY_PASSWORD")
                      }
                  }
                  buildTypes {
                      getByName("release") {
                          signingConfig = signingConfigs.getByName("customRelease")
                      }
                  }
              }
          }
          EOF

      - name: 3. 解码签名
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo -n "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: 4. 赋权
        run: chmod +x gradlew

      # ==============================
      # 最终正确弹窗屏蔽
      # ==============================
      - name: 屏蔽免责弹窗（官方源码匹配 · 绝不闪退）
        run: |
          FILE=app/src/main/java/com/sesame/ag/ui/activity/MainActivity.kt
          sed -i 's/DisclaimerDialog().show(supportFragmentManager)/\/\/ &/' "$FILE"

      - name: 5. 构建
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: 6. 重命名
        env:
          VER: ${{ env.APP_VER }}
        run: |
          SRC_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$SRC_APK" "./Sesame-AG-arm64-v8a-${VER}-signed.apk"

      - name: 7. 上传
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: Sesame-AG-arm64-v8a-${{ env.APP_VER }}-signed.apk
