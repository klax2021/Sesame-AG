name: Build Signed APK
on:
  push:
    tags:
      - '*'       # 推送新 Tag 时全自动触发
  workflow_dispatch: # 支持在 main 分支手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 1. 自动切换源码
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "APP_VER=${TAG}" >> $GITHUB_ENV
          else
            # 修正手动触发时的语义化版本排序，确保切到正确的最新发布版
            LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
            if [ -n "$LATEST_TAG" ]; then
              git checkout $LATEST_TAG
              echo "APP_VER=${LATEST_TAG}" >> $GITHUB_ENV
            else
              echo "APP_VER=dev" >> $GITHUB_ENV
            fi
          fi

      - name: 预配置Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 2. 剥离免责弹窗 show 逻辑
        run: |
          TARGET_MAIN=$(find app/src -name "MainActivity.kt")
          if [ -n "$TARGET_MAIN" ]; then
            echo "找到目标文件: $TARGET_MAIN"
            # 只切掉末尾的 .show()，保留完整的对象实例化闭环
            sed -i -E 's/(DisclaimerDialog\(.*\))\.show\(\)/\1/' "$TARGET_MAIN"
          else
            echo "未找到 MainActivity.kt，跳过此步骤"
          fi

      - name: 3. 动态注入个人签名（安全沿用官方原生架构与混淆配置）
        run: |
          cat << 'EOF' >> app/build.gradle.kts

          android {
              if (System.getenv("KEYSTORE_PASSWORD") != null) {
                  signingConfigs {
                      maybeCreate("customRelease").apply {
                          storeFile = file("mykey.jks")
                          storePassword = System.getenv("KEYSTORE_PASSWORD")
                          keyAlias = System.getenv("KEY_ALIAS")
                          keyPassword = System.getenv("KEY_PASSWORD")
                      }
                  }
                  buildTypes {
                      getByName("release") {
                          signingConfig = signingConfigs.getByName("customRelease")
                      }
                  }
              }
          }
          EOF

          # 彻底移除原先的 abiFilters.clear() 逻辑，绝不从源码层面污染官方配置

      - name: 4. Decode Keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo -n "$KEYSTORE" | base64 -d > app/mykey.jks

      - name: 5. Make gradlew executable
        run: chmod +x gradlew

      - name: 6. 执行官方标准 Release 编译（通过参数限制 Gradle 仅对 v8a 目标输出）
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # 核心改动：不破坏 gradle 源码，直接利用原生环境参数编译单架构，省时且安全
        run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: 7. 精准收集 arm64-v8a 成品 APK（剔除 unaligned 损坏件）
        run: |
          mkdir -p ./out_apks
          # 过滤未对齐中间件，精准抓取带有 arm64-v8a 的最终 Release 成品
          find app/build/outputs/apk/release -name "*arm64-v8a*.apk" ! -name "*unaligned*" -exec cp {} ./out_apks/ \;
          ls -l ./out_apks/

      - name: 8. 上传有效打包产物
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-AG-${{ env.APP_VER }}-arm64-v8a
          path: ./out_apks/
